<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="popup.css" />
<title>Firehouse</title>
</head>
<body>

<!-- LOGIN -->
<div id="loginView" class="login">
  <div class="card">
    <div class="logo-lg">
      <svg width="30" height="30" viewBox="0 0 24 24" fill="#fff"><path d="M12 2c.5 3-1.5 4.5-3 6.5C7.4 10.6 6 12.6 6 15a6 6 0 0 0 12 0c0-1.8-.8-3.3-1.7-4.6-.3.9-1 1.6-1.9 1.6.6-2-.2-4.2-1.4-5.8C11.9 4.7 12.3 3.2 12 2Z"/></svg>
    </div>
    <h1>Firehouse</h1>
    <p>Sign in with your <b>@kula.ai</b> Google account.</p>
    <div id="loginError" class="banner hidden"></div>
    <button class="gbtn" id="signInBtn">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Sign in with Google
    </button>
    <p class="hint" id="loginHint">A Google window will open. After signing in, click the Firehouse icon again.</p>
  </div>
</div>

<!-- LOADING -->
<div id="loadingView" class="login hidden"><div class="muted">Loading…</div></div>

<!-- APP -->
<div id="appView" class="hidden">
  <header>
    <div class="brand">
      <span class="logo"><svg width="16" height="16" viewBox="0 0 24 24" fill="#fff"><path d="M12 2c.5 3-1.5 4.5-3 6.5C7.4 10.6 6 12.6 6 15a6 6 0 0 0 12 0c0-1.8-.8-3.3-1.7-4.6-.3.9-1 1.6-1.9 1.6.6-2-.2-4.2-1.4-5.8C11.9 4.7 12.3 3.2 12 2Z"/></svg></span>
      <b>Firehouse</b>
    </div>
    <div class="who">
      <span class="avatar" id="whoAvatar"></span>
      <button class="ghost small" id="signOutBtn">Sign out</button>
    </div>
  </header>

  <div class="wrap">
    <div class="tabs">
      <button id="tabTrack" class="active" data-tab="track">Track</button>
      <button id="tabHistory" data-tab="history">History</button>
      <button id="tabAdmin" class="hidden" data-tab="admin">Rollup</button>
    </div>

    <!-- TRACK -->
    <div id="trackTab">
      <div class="card">
        <div class="grid two">
          <div>
            <label for="activityType">Activity type</label>
            <select id="activityType">
              <option value="issue">Issue</option>
              <option value="call">Customer call</option>
              <option value="offline">Pylon Clean up</option>
              <option value="project">Project</option>
              <option value="demo">Demo / implementation call</option>
              <option value="troubleshoot">Ticket troubleshooting</option>
              <option value="intoffline">Internal offline work with engineering</option>
              <option value="followup">Ticket follow up</option>
              <option value="linear">Linear clean up</option>
            </select>
          </div>
          <div>
            <label id="customerLabel" for="customer">Customer</label>
            <input id="customer" placeholder="Which customer is this for?" autocomplete="off" />
          </div>
        </div>
        <div style="margin-top:12px">
          <label for="note">Note (optional)</label>
          <input id="note" placeholder="What are you working on?" autocomplete="off" />
        </div>
        <div class="timer" id="timerDisplay">00:00:00</div>
        <div class="row" style="justify-content:center">
          <button id="startBtn" class="primary">▶ Start</button>
          <button id="stopBtn" class="danger hidden">■ Stop &amp; log</button>
          <button id="cancelBtn" class="ghost hidden">Discard</button>
        </div>
        <div id="liveMeta" class="center muted small hidden" style="margin-top:6px"></div>
      </div>

      <div class="card">
        <div class="toolbar" style="margin-bottom:0">
          <b>Log time manually</b>
          <button class="ghost small" id="manualToggle">+ Add entry</button>
        </div>
        <div id="manualForm" class="hidden" style="margin-top:14px">
          <div class="grid two">
            <div>
              <label for="mDate">Date</label>
              <input id="mDate" type="date" />
            </div>
            <div>
              <label for="mType">Activity type</label>
              <select id="mType">
                <option value="issue">Issue</option>
                <option value="call">Customer call</option>
                <option value="offline">Pylon Clean up</option>
                <option value="project">Project</option>
                <option value="demo">Demo / implementation call</option>
                <option value="troubleshoot">Ticket troubleshooting</option>
                <option value="intoffline">Internal offline work with engineering</option>
                <option value="followup">Ticket follow up</option>
                <option value="linear">Linear clean up</option>
              </select>
            </div>
          </div>
          <div style="margin-top:12px">
            <label for="mAmount">Time spent</label>
            <div class="row" style="align-items:stretch; gap:8px">
              <input id="mAmount" type="number" min="0" step="any" placeholder="e.g. 20" style="flex:2" />
              <select id="mUnit" style="flex:1">
                <option value="minutes">Minutes</option>
                <option value="hours">Hours</option>
              </select>
            </div>
          </div>
          <div class="grid two" style="margin-top:12px">
            <div>
              <label for="mCustomer">Customer</label>
              <input id="mCustomer" placeholder="Which customer?" autocomplete="off" />
            </div>
            <div>
              <label for="mNote">Note (optional)</label>
              <input id="mNote" placeholder="What was this?" autocomplete="off" />
            </div>
          </div>
          <button class="primary" id="saveManualBtn" style="margin-top:14px">Save entry</button>
        </div>
      </div>

      <div class="card"><div class="stat" id="todayStats"></div></div>
    </div>

    <!-- HISTORY -->
    <div id="historyTab" class="hidden">
      <div class="card">
        <div class="toolbar">
          <div><b>My entries</b> <span class="muted small" id="historyCount"></span></div>
          <button class="ghost small" id="exportMine">Export</button>
        </div>
        <div id="historyTable"></div>
      </div>
    </div>

    <!-- ADMIN -->
    <div id="adminTab" class="hidden">
      <div class="card">
        <div class="toolbar">
          <div><b>All agents</b></div>
          <button class="ghost small" id="exportAll">Export</button>
        </div>
        <div style="margin-bottom:14px">
          <label for="adminRange">Date range</label>
          <select id="adminRange">
            <option value="all">All time</option>
            <option value="today">Today</option>
            <option value="week">This week</option>
            <option value="custom">Custom…</option>
          </select>
          <div id="customRange" class="hidden row" style="align-items:flex-end; margin-top:10px">
            <div style="flex:1"><label for="adminFrom">From</label><input id="adminFrom" type="date" /></div>
            <div style="flex:1"><label for="adminTo">To</label><input id="adminTo" type="date" /></div>
          </div>
        </div>
        <div class="stat" id="adminStats" style="margin-bottom:16px"></div>
        <div class="sec-title">By agent</div>
        <div id="byAgent"></div>
        <div class="sec-title">By customer</div>
        <div id="byCustomer"></div>
        <div class="sec-title">By activity type</div>
        <div id="byType"></div>
      </div>
    </div>
  </div>
</div>

<script src="lib/supabase.js"></script>
<script src="popup.js"></script>
</body>
</html>
