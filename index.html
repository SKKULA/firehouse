<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Firehouse</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0d0f14; --bg2:#11141b; --panel:#161a22; --panel2:#1d222c; --line:#2a3038;
    --text:#eef1f6; --muted:#9099a8; --faint:#6b7280;
    --ember:#ff6a1a; --ember2:#ffb020; --ember-soft:rgba(255,106,26,.14);
    --accent:#ff6a1a; --accent2:#34d399;
    --danger:#ff5b6e; --warn:#ffb020; --ok:#34d399; --radius:16px;
    --shadow:0 8px 30px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0; font-family:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--text); -webkit-font-smoothing:antialiased;
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(255,106,26,.10), transparent 60%),
      radial-gradient(900px 500px at -10% 10%, rgba(255,176,32,.06), transparent 55%),
      var(--bg);
    background-attachment:fixed;
  }
  header{display:flex; align-items:center; justify-content:space-between; padding:14px 22px;
    border-bottom:1px solid var(--line); background:rgba(18,21,28,.7); backdrop-filter:blur(10px);
    position:sticky; top:0; z-index:10}
  .brand{display:flex; align-items:center; gap:10px; font-weight:800; font-size:18px; letter-spacing:-.2px}
  .brand .logo{width:30px; height:30px; display:grid; place-items:center; border-radius:9px;
    background:linear-gradient(160deg,var(--ember),#ff9430); box-shadow:0 4px 14px rgba(255,106,26,.45)}
  .brand b{background:linear-gradient(90deg,#fff,#ffd9bd); -webkit-background-clip:text; background-clip:text; color:transparent}
  .who{display:flex; align-items:center; gap:12px; font-size:14px; color:var(--muted)}
  .who b{color:var(--text)}
  .avatar{width:30px; height:30px; border-radius:50%; background:linear-gradient(160deg,var(--ember),#ff9430);
    display:grid; place-items:center; font-weight:700; font-size:13px; color:#fff}
  button{font:inherit; cursor:pointer; border:1px solid var(--line); background:var(--panel2); color:var(--text);
    padding:10px 15px; border-radius:11px; transition:.15s; font-weight:500}
  button:hover{border-color:#3a4150; transform:translateY(-1px)}
  button.primary{background:linear-gradient(160deg,var(--ember),#ff8a3d); border-color:transparent; color:#fff; font-weight:700;
    box-shadow:0 6px 18px rgba(255,106,26,.4)}
  button.primary:hover{filter:brightness(1.06)}
  button.danger{background:linear-gradient(160deg,#ff4d63,#ff7a52); border-color:transparent; color:#fff; font-weight:700;
    box-shadow:0 6px 18px rgba(255,77,99,.35)}
  button.ghost{background:transparent}
  button.ghost:hover{background:var(--panel2)}
  button:disabled{opacity:.45; cursor:not-allowed; transform:none}
  .wrap{max-width:1040px; margin:0 auto; padding:26px 20px 90px}
  .card{background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); padding:22px; margin-bottom:20px; box-shadow:var(--shadow)}
  label{display:block; font-size:11.5px; text-transform:uppercase; letter-spacing:.7px; color:var(--muted); margin-bottom:7px; font-weight:600}
  input,select{width:100%; padding:12px 13px; border-radius:11px; border:1px solid var(--line); background:var(--bg2); color:var(--text); font:inherit; transition:.15s}
  input:focus,select:focus{outline:none; border-color:var(--ember); box-shadow:0 0 0 3px var(--ember-soft)}
  input::placeholder{color:var(--faint)}
  .grid{display:grid; gap:14px}
  .grid.two{grid-template-columns:1fr 1fr}
  .row{display:flex; gap:12px; align-items:flex-end; flex-wrap:wrap}
  .timer{font-variant-numeric:tabular-nums; font-size:68px; font-weight:800; letter-spacing:1px; text-align:center; padding:18px 0 6px; line-height:1}
  .timer.live{background:linear-gradient(90deg,var(--ember),var(--ember2)); -webkit-background-clip:text; background-clip:text; color:transparent; animation:pulse 2s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.78}}
  .muted{color:var(--muted)}
  .center{text-align:center}
  .tabs{display:flex; gap:8px; margin-bottom:22px; background:var(--panel); padding:6px; border-radius:14px; border:1px solid var(--line); width:fit-content; max-width:100%; overflow:auto}
  .tabs button{border-radius:9px; border-color:transparent; background:transparent; white-space:nowrap}
  .tabs button.active{background:linear-gradient(160deg,var(--ember),#ff8a3d); color:#fff; font-weight:700; box-shadow:0 4px 14px rgba(255,106,26,.4)}
  table{width:100%; border-collapse:collapse; font-size:14px}
  th,td{text-align:left; padding:11px 12px; border-bottom:1px solid var(--line)}
  th{color:var(--muted); font-size:11.5px; text-transform:uppercase; letter-spacing:.5px; font-weight:600}
  tr:last-child td{border-bottom:none}
  tbody tr{transition:.12s}
  tbody tr:hover{background:rgba(255,255,255,.02)}
  .pill{display:inline-block; padding:4px 10px; border-radius:999px; font-size:12px; font-weight:600}
  .pill.issue{background:#1e2a4d; color:#9cc0ff}
  .pill.call{background:#11332f; color:#6ee7d6}
  .pill.offline{background:#332a14; color:#ffd699}
  .pill.project{background:#2d1e3d; color:#d8b4fe}
  .pill.demo{background:#3a1c24; color:#ff9db0}
  .pill.troubleshoot{background:#10303a; color:#7fd6e8}
  .pill.intoffline{background:#2a2233; color:#c9b6e6}
  .pill.followup{background:#13322a; color:#7fe0bd}
  .pill.linear{background:#222a3d; color:#aab8e6}
  .pill.oncall{background:#33231a; color:#ffc59e}
  .pill.closure{background:#143326; color:#86e6b8}
  .empty{padding:40px; text-align:center; color:var(--muted)}
  .login{min-height:88vh; display:flex; align-items:center; justify-content:center}
  .login .card{max-width:430px; width:100%; text-align:center; padding:36px 30px}
  .login .logo-lg{width:64px; height:64px; margin:0 auto 18px; display:grid; place-items:center; border-radius:18px;
    background:linear-gradient(160deg,var(--ember),#ff9430); box-shadow:0 10px 30px rgba(255,106,26,.5)}
  .login h1{margin:0 0 6px; font-size:30px; font-weight:800; letter-spacing:-.5px}
  .login p{margin:0 0 24px; color:var(--muted)}
  .gbtn{display:flex; align-items:center; justify-content:center; gap:10px; width:100%; background:#fff; color:#1f1f1f; border:none; padding:13px; font-weight:600; border-radius:11px}
  .gbtn:hover{filter:brightness(.96)}
  .stat{display:flex; gap:16px; flex-wrap:wrap}
  .stat .box{flex:1; min-width:150px; background:linear-gradient(160deg,var(--panel2),var(--bg2)); border:1px solid var(--line); border-radius:14px; padding:16px 18px; position:relative; overflow:hidden}
  .stat .box::before{content:''; position:absolute; top:0; left:0; width:3px; height:100%; background:linear-gradient(180deg,var(--ember),transparent)}
  .stat .box .n{font-size:26px; font-weight:800; letter-spacing:-.5px}
  .stat .box .l{font-size:11.5px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; margin-top:2px; font-weight:600}
  .hidden{display:none}
  .small{font-size:13px}
  .toolbar{display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:14px}
  .banner{padding:12px 16px; border-radius:11px; background:#3a1c24; color:#ffb3c0; margin-bottom:16px; font-size:14px}
  .bar-wrap{display:flex; align-items:center; gap:10px}
  .bar-track{flex:1; height:8px; background:var(--line); border-radius:999px; overflow:hidden; min-width:60px}
  .bar-fill{height:100%; background:linear-gradient(90deg,var(--ember),var(--ember2)); border-radius:999px}
  .sec-title{margin:22px 0 10px; text-transform:uppercase; letter-spacing:.6px; font-size:12px; color:var(--muted); font-weight:700; display:flex; align-items:center; gap:8px}
  .sec-title::before{content:''; width:14px; height:2px; background:var(--ember); border-radius:2px}
  .sec-title.collapsible{cursor:pointer; user-select:none}
  .sec-title .caret{display:inline-block; width:12px; font-size:10px; color:var(--ember)}
  @media (max-width:640px){
    .grid.two{grid-template-columns:1fr}
    .wrap{padding:18px 14px 80px}
    header{padding:12px 14px}
    .who span.lbl{display:none}
    .timer{font-size:54px}
    .card{padding:18px}
    th:nth-child(4),td:nth-child(4){display:none}
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginView" class="login">
  <div class="card">
    <div class="logo-lg">
      <svg width="34" height="34" viewBox="0 0 24 24" fill="#fff"><path d="M12 2c.5 3-1.5 4.5-3 6.5C7.4 10.6 6 12.6 6 15a6 6 0 0 0 12 0c0-1.8-.8-3.3-1.7-4.6-.3.9-1 1.6-1.9 1.6.6-2-.2-4.2-1.4-5.8C11.9 4.7 12.3 3.2 12 2Z"/></svg>
    </div>
    <h1>Firehouse</h1>
    <p>Sign in with your <b>@kula.ai</b> Google account to track your time.</p>
    <div id="loginError" class="banner hidden"></div>
    <button class="gbtn" onclick="signIn()">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Sign in with Google
    </button>
    <p class="small muted" style="margin-top:18px; margin-bottom:0">Only kula.ai accounts are allowed.</p>
  </div>
</div>

<!-- LOADING -->
<div id="loadingView" class="login hidden"><div class="muted">Loading…</div></div>

<!-- APP -->
<div id="appView" class="hidden">
  <header>
    <div class="brand">
      <span class="logo"><svg width="18" height="18" viewBox="0 0 24 24" fill="#fff"><path d="M12 2c.5 3-1.5 4.5-3 6.5C7.4 10.6 6 12.6 6 15a6 6 0 0 0 12 0c0-1.8-.8-3.3-1.7-4.6-.3.9-1 1.6-1.9 1.6.6-2-.2-4.2-1.4-5.8C11.9 4.7 12.3 3.2 12 2Z"/></svg></span>
      <b>Firehouse</b>
    </div>
    <div class="who">
      <span class="avatar" id="whoAvatar"></span>
      <span class="lbl">Signed in as <b id="whoName"></b></span>
      <button class="ghost small" onclick="signOut()">Sign out</button>
    </div>
  </header>

  <div class="wrap">
    <div class="tabs">
      <button id="tabTrack" class="active" onclick="showTab('track')">Track</button>
      <button id="tabHistory" onclick="showTab('history')">My history</button>
      <button id="tabAdmin" class="hidden" onclick="showTab('admin')">Manager rollup</button>
    </div>

    <!-- TRACK -->
    <div id="trackTab">
      <div class="card">
        <div class="grid two">
          <div>
            <label for="activityType">Activity type</label>
            <select id="activityType" onchange="updateCustomerLabel()">
              <option value="issue">New ticket triage/troubleshooting</option>
              <option value="call">Customer call</option>
              <option value="offline">Pylon Clean up</option>
              <option value="project">Project</option>
              <option value="demo">Demo / implementation call</option>
              <option value="troubleshoot">Ticket troubleshooting</option>
              <option value="intoffline">Internal offline work with engineering</option>
              <option value="followup">Ticket follow up</option>
              <option value="linear">Linear clean up</option>
              <option value="oncall">On call sync</option>
              <option value="closure">Ticket closure</option>
            </select>
          </div>
          <div>
            <label id="customerLabel" for="customer">Customer</label>
            <input id="customer" placeholder="Which customer is this for?" autocomplete="off" />
          </div>
        </div>
        <div style="margin-top:14px">
          <label for="note">Note (optional)</label>
          <input id="note" placeholder="What are you working on?" autocomplete="off" />
        </div>
        <div class="timer" id="timerDisplay">00:00:00</div>
        <div class="row" style="justify-content:center">
          <button id="startBtn" class="primary" onclick="startTimer()">▶ Start</button>
          <button id="stopBtn" class="danger hidden" onclick="stopTimer()">■ Stop &amp; log</button>
          <button id="cancelBtn" class="ghost hidden" onclick="cancelTimer()">Discard</button>
        </div>
        <div id="liveMeta" class="center muted small hidden" style="margin-top:6px"></div>
      </div>

      <div class="card">
        <div class="toolbar" style="margin-bottom:0">
          <b>Log time manually</b>
          <button class="ghost small" id="manualToggle" onclick="toggleManual()">+ Add entry</button>
        </div>
        <div id="manualForm" class="hidden" style="margin-top:16px">
          <div class="grid two">
            <div>
              <label for="mDate">Date</label>
              <input id="mDate" type="date" />
            </div>
            <div>
              <label for="mType">Activity type</label>
              <select id="mType">
                <option value="issue">New ticket triage/troubleshooting</option>
                <option value="call">Customer call</option>
                <option value="offline">Pylon Clean up</option>
                <option value="project">Project</option>
                <option value="demo">Demo / implementation call</option>
                <option value="troubleshoot">Ticket troubleshooting</option>
                <option value="intoffline">Internal offline work with engineering</option>
                <option value="followup">Ticket follow up</option>
                <option value="linear">Linear clean up</option>
                <option value="oncall">On call sync</option>
                <option value="closure">Ticket closure</option>
              </select>
            </div>
          </div>
          <div class="grid two" style="margin-top:14px">
            <div>
              <label for="mAmount">Time spent</label>
              <div class="row" style="align-items:stretch; gap:8px">
                <input id="mAmount" type="number" min="0" step="any" placeholder="e.g. 20" style="flex:2" />
                <select id="mUnit" style="flex:1">
                  <option value="minutes">Minutes</option>
                  <option value="hours">Hours</option>
                </select>
              </div>
            </div>
            <div></div>
          </div>
          <div class="grid two" style="margin-top:14px">
            <div>
              <label for="mCustomer">Customer</label>
              <input id="mCustomer" placeholder="Which customer?" autocomplete="off" />
            </div>
            <div>
              <label for="mNote">Note (optional)</label>
              <input id="mNote" placeholder="What was this?" autocomplete="off" />
            </div>
          </div>
          <button class="primary" style="margin-top:16px" onclick="saveManual()">Save entry</button>
        </div>
      </div>

      <div class="card"><div class="stat" id="todayStats"></div></div>
    </div>

    <!-- HISTORY -->
    <div id="historyTab" class="hidden">
      <div class="card">
        <div class="toolbar">
          <div><b>My entries</b> <span class="muted small" id="historyCount"></span></div>
          <button class="ghost small" onclick="exportCSV('mine')">Export CSV</button>
        </div>
        <div id="historyTable"></div>
      </div>
    </div>

    <!-- ADMIN -->
    <div id="adminTab" class="hidden">
      <div class="card">
        <div class="toolbar">
          <div><b>All agents</b> <span class="muted small">— totals across the team</span></div>
          <button class="ghost small" onclick="exportCSV('all')">Export CSV</button>
        </div>
        <div class="row" style="margin-bottom:16px; align-items:flex-end">
          <div style="min-width:160px">
            <label for="adminRange">Date range</label>
            <select id="adminRange" onchange="onRangeChange()">
              <option value="all">All time</option>
              <option value="today">Today</option>
              <option value="week">This week</option>
              <option value="custom">Custom…</option>
            </select>
          </div>
          <div style="min-width:180px">
            <label for="adminAgent">Agent</label>
            <select id="adminAgent" onchange="renderAdmin()">
              <option value="all">All agents</option>
            </select>
          </div>
          <div id="customRange" class="hidden row" style="align-items:flex-end">
            <div><label for="adminFrom">From</label><input id="adminFrom" type="date" onchange="renderAdmin()" /></div>
            <div><label for="adminTo">To</label><input id="adminTo" type="date" onchange="renderAdmin()" /></div>
          </div>
        </div>
        <div class="stat" id="adminStats" style="margin-bottom:18px"></div>
        <div class="sec-title">By agent</div>
        <div id="byAgent"></div>
        <div class="sec-title collapsible" onclick="toggleSection('byCustomer', this)"><span class="caret">▾</span> By customer</div>
        <div id="byCustomer"></div>
        <div class="sec-title collapsible" onclick="toggleSection('byType', this)"><span class="caret">▾</span> By activity type</div>
        <div id="byType"></div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* =================== CONFIG — fill these in =================== */
const SUPABASE_URL      = 'https://vicfnkbsrcmemhffuqyq.supabase.co';        // Supabase project URL
const SUPABASE_ANON_KEY = 'sb_publishable__ouGswb_yT67VCufAJY-Zg_KVw5b_tv';   // publishable / anon key
const ALLOWED_DOMAIN    = 'kula.ai';                  // only this email domain may sign in
const ADMIN_EMAILS      = ['saikausik@kula.ai'];      // who can see the Manager rollup
/* ============================================================= */

const SHIFT_HOURS = 9, BREAK_HOURS = 1;
const TARGET_SECONDS = (SHIFT_HOURS - BREAK_HOURS) * 3600;
const TYPES = {
  issue:{label:'New ticket triage/troubleshooting',cls:'issue'}, call:{label:'Customer call',cls:'call'},
  offline:{label:'Pylon Clean up',cls:'offline'}, project:{label:'Project',cls:'project'},
  demo:{label:'Demo / implementation call',cls:'demo'},
  troubleshoot:{label:'Ticket troubleshooting',cls:'troubleshoot'},
  intoffline:{label:'Internal offline work with engineering',cls:'intoffline'},
  followup:{label:'Ticket follow up',cls:'followup'},
  linear:{label:'Linear clean up',cls:'linear'},
  oncall:{label:'On call sync',cls:'oncall'},
  closure:{label:'Ticket closure',cls:'closure'},
};

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let currentUser = null;   // email
let currentName = null;   // display name
let isAdmin = false;
let entriesCache = [];
let timer = null, startTs = null;

/* ---------- Data layer (Supabase) ---------- */
function loadEntries(){ return entriesCache; }
async function refreshEntries(){
  // admins get everyone (RLS allows it); others get only their own rows
  const { data, error } = await sb.from('entries').select('*').order('start_ts', {ascending:false});
  if(error){ console.error(error); return; }
  entriesCache = data.map(r=>({
    id:r.id, user:r.user_email, name:r.user_name, type:r.type, customer:r.customer,
    note:r.note, start:Number(r.start_ts), end:Number(r.end_ts), seconds:r.seconds, manual:r.manual,
  }));
}
async function addEntry(e){
  const { error } = await sb.from('entries').insert({
    user_email:currentUser, user_name:currentName, type:e.type, customer:e.customer,
    note:e.note, start_ts:e.start, end_ts:e.end, seconds:e.seconds, manual:!!e.manual,
  });
  if(error){ alert('Could not save: '+error.message); return false; }
  await refreshEntries();
  return true;
}
async function delEntryRemote(id){
  const { error } = await sb.from('entries').delete().eq('id', id);
  if(error){ alert('Could not delete: '+error.message); return; }
  await refreshEntries();
}

/* ---------- Auth ---------- */
async function signIn(){
  await sb.auth.signInWithOAuth({
    provider:'google',
    options:{ queryParams:{ hd: ALLOWED_DOMAIN, prompt:'select_account' }, redirectTo: location.origin + location.pathname },
  });
}
async function signOut(){
  if(timer){ if(!confirm('A timer is running. Sign out and discard it?')) return; cancelTimer(); }
  await sb.auth.signOut();
  location.reload();
}
function showLoginError(msg){
  const b = document.getElementById('loginError');
  b.textContent = msg; b.classList.remove('hidden');
}
let booted = false;
async function handleSession(session){
  console.log('[firehouse] handleSession', session ? session.user.email : 'no session');
  if(!session){ if(!booted) showView('login'); return; }
  const email = (session.user.email||'').toLowerCase();
  if(!email.endsWith('@'+ALLOWED_DOMAIN)){
    await sb.auth.signOut();
    showView('login');
    showLoginError(`Access is limited to @${ALLOWED_DOMAIN} accounts. ${email} is not allowed.`);
    return;
  }
  if(booted) return;            // already initialised; ignore duplicate auth events
  booted = true;
  currentUser = email;
  currentName = (session.user.user_metadata && (session.user.user_metadata.full_name || session.user.user_metadata.name)) || email.split('@')[0];
  isAdmin = ADMIN_EMAILS.map(s=>s.toLowerCase()).includes(email);
  document.getElementById('whoName').textContent = currentName;
  document.getElementById('whoAvatar').textContent = currentName.trim().split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase();
  document.getElementById('tabAdmin').classList.toggle('hidden', !isAdmin);
  // show the app immediately; load data in the background so a slow/failed
  // fetch can never trap us on the Loading screen
  showView('app');
  showTab('track');
  try {
    await refreshEntries();
    showTab('track');
  } catch(err){
    console.error('[firehouse] data load failed', err);
    alert('Signed in, but could not load saved entries. If this is the first run, make sure the database SQL from SETUP.md has been applied. Details: ' + (err && err.message));
  }
}
function showView(v){
  document.getElementById('loginView').classList.toggle('hidden', v!=='login');
  document.getElementById('loadingView').classList.toggle('hidden', v!=='loading');
  document.getElementById('appView').classList.toggle('hidden', v!=='app');
}

/* ---------- Timer ---------- */
function startTimer(){
  const customer = document.getElementById('customer').value.trim();
  const type = document.getElementById('activityType').value;
  if(!customer){ alert('Please enter the customer this activity is for.'); document.getElementById('customer').focus(); return; }
  startTs = Date.now();
  document.getElementById('startBtn').classList.add('hidden');
  document.getElementById('stopBtn').classList.remove('hidden');
  document.getElementById('cancelBtn').classList.remove('hidden');
  document.getElementById('timerDisplay').classList.add('live');
  lockInputs(true);
  const meta = document.getElementById('liveMeta');
  meta.classList.remove('hidden');
  meta.textContent = `${TYPES[type].label} • ${customer}`;
  tick(); timer = setInterval(tick, 1000);
}
function tick(){ document.getElementById('timerDisplay').textContent = fmt(Date.now()-startTs); }
async function stopTimer(){
  const elapsed = Date.now() - startTs;
  const ok = await addEntry({
    type: document.getElementById('activityType').value,
    customer: document.getElementById('customer').value.trim(),
    note: document.getElementById('note').value.trim(),
    start: startTs, end: Date.now(), seconds: Math.round(elapsed/1000),
  });
  if(ok){ resetTimer(); renderToday(); }
}
function cancelTimer(){ resetTimer(); }
function resetTimer(){
  if(timer){ clearInterval(timer); timer=null; }
  startTs=null;
  document.getElementById('timerDisplay').textContent='00:00:00';
  document.getElementById('timerDisplay').classList.remove('live');
  document.getElementById('startBtn').classList.remove('hidden');
  document.getElementById('stopBtn').classList.add('hidden');
  document.getElementById('cancelBtn').classList.add('hidden');
  document.getElementById('liveMeta').classList.add('hidden');
  document.getElementById('customer').value='';
  document.getElementById('note').value='';
  lockInputs(false);
}
function lockInputs(on){ ['activityType','customer','note'].forEach(id=>document.getElementById(id).disabled=on); }
function updateCustomerLabel(){
  const t = document.getElementById('activityType').value;
  document.getElementById('customerLabel').textContent = (t==='offline'||t==='project') ? 'Customer (or "Internal")' : 'Customer';
}

/* ---------- Manual entry ---------- */
function toggleManual(){
  const f = document.getElementById('manualForm');
  const open = f.classList.toggle('hidden') === false;
  document.getElementById('manualToggle').textContent = open ? '− Hide' : '+ Add entry';
  if(open && !document.getElementById('mDate').value) document.getElementById('mDate').value = dayKey(Date.now());
}
async function saveManual(){
  const date = document.getElementById('mDate').value;
  const amount = parseFloat(document.getElementById('mAmount').value);
  const unit = document.getElementById('mUnit').value;
  const customer = document.getElementById('mCustomer').value.trim();
  if(!date){ alert('Please pick a date.'); return; }
  if(!amount || amount<=0){ alert('Please enter how much time you spent.'); return; }
  if(!customer){ alert('Please enter the customer this activity is for.'); return; }
  const startTs2 = new Date(`${date}T12:00`).getTime();
  const seconds = Math.round(amount*(unit==='hours'?3600:60));
  const ok = await addEntry({
    type: document.getElementById('mType').value, customer,
    note: document.getElementById('mNote').value.trim(),
    start: startTs2, end: startTs2+seconds*1000, seconds, manual:true,
  });
  if(ok){ ['mAmount','mCustomer','mNote'].forEach(id=>document.getElementById(id).value=''); renderToday(); alert('Entry saved.'); }
}

/* ---------- Formatting ---------- */
function fmt(ms){ const s=Math.floor(ms/1000); const h=String(Math.floor(s/3600)).padStart(2,'0'); const m=String(Math.floor((s%3600)/60)).padStart(2,'0'); const sec=String(s%60).padStart(2,'0'); return `${h}:${m}:${sec}`; }
function fmtDur(seconds){ const h=Math.floor(seconds/3600), m=Math.floor((seconds%3600)/60); if(h>0)return `${h}h ${m}m`; if(m>0)return `${m}m`; return `${seconds}s`; }
function fmtHM(seconds){ const h=Math.floor(seconds/3600), m=Math.round((seconds%3600)/60); return `${h}h ${String(m).padStart(2,'0')}m`; }
function isToday(ts){ const d=new Date(ts), n=new Date(); return d.getFullYear()===n.getFullYear()&&d.getMonth()===n.getMonth()&&d.getDate()===n.getDate(); }
function fmtTime(ts){ return new Date(ts).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}); }
function fmtDate(ts){ return new Date(ts).toLocaleDateString([], {month:'short',day:'numeric'}); }
function dayKey(ts){ const d=new Date(ts); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function dayLabel(ts){ return new Date(ts).toLocaleDateString([], {weekday:'short',month:'short',day:'numeric',year:'numeric'}); }

/* ---------- Tabs ---------- */
function showTab(tab){
  if(tab==='admin' && !isAdmin) return;
  ['track','history','admin'].forEach(t=>{
    document.getElementById(t+'Tab').classList.toggle('hidden', t!==tab);
    document.getElementById('tab'+t.charAt(0).toUpperCase()+t.slice(1)).classList.toggle('active', t===tab);
  });
  if(tab==='track') renderToday();
  if(tab==='history') renderHistory();
  if(tab==='admin') renderAdmin();
}

/* ---------- Today ---------- */
function renderToday(){
  const mine = loadEntries().filter(e=>e.user===currentUser && isToday(e.start));
  const total = mine.reduce((a,e)=>a+e.seconds,0);
  const byType={}; mine.forEach(e=>byType[e.type]=(byType[e.type]||0)+e.seconds);
  const topType = Object.entries(byType).sort((a,b)=>b[1]-a[1])[0];
  document.getElementById('todayStats').innerHTML =
    `<div class="box"><div class="n">${fmtDur(total)}</div><div class="l">Tracked today</div></div>`+
    `<div class="box"><div class="n">${mine.length}</div><div class="l">Entries today</div></div>`+
    `<div class="box"><div class="n">${topType?TYPES[topType[0]].label:'—'}</div><div class="l">Top activity</div></div>`;
}

/* ---------- History (per-day) ---------- */
function renderHistory(){
  const mine = loadEntries().filter(e=>e.user===currentUser).sort((a,b)=>b.start-a.start);
  document.getElementById('historyCount').textContent = `(${mine.length})`;
  if(mine.length===0){ document.getElementById('historyTable').innerHTML='<div class="empty">No entries yet. Start a timer to log your first one.</div>'; return; }
  const days={}; mine.forEach(e=>{ const k=dayKey(e.start); (days[k]=days[k]||[]).push(e); });
  let out='';
  Object.keys(days).sort((a,b)=>b.localeCompare(a)).forEach(k=>{
    const list=days[k];
    const dayTotal=list.reduce((a,e)=>a+e.seconds,0);
    const pct=Math.min(100, Math.round(dayTotal/TARGET_SECONDS*100));
    const met=dayTotal>=TARGET_SECONDS, remaining=TARGET_SECONDS-dayTotal;
    const col=met?'var(--ok)':(pct>=70?'var(--warn)':'var(--muted)');
    const status=met?`Target met (+${fmtHM(dayTotal-TARGET_SECONDS)})`:`${fmtHM(remaining)} short of ${SHIFT_HOURS-BREAK_HOURS}h`;
    const rows=list.map(e=>`
      <tr>
        <td>${e.manual?'<span class="muted">Manual</span>':fmtTime(e.start)+'–'+fmtTime(e.end)}</td>
        <td><span class="pill ${TYPES[e.type].cls}">${TYPES[e.type].label}</span></td>
        <td>${esc(e.customer)}</td>
        <td>${esc(e.note)||'<span class="muted">—</span>'}</td>
        <td><b>${fmtDur(e.seconds)}</b></td>
        <td><button class="ghost small" onclick="delEntry('${e.id}')">✕</button></td>
      </tr>`).join('');
    out+=`
      <div class="card" style="background:var(--panel2); margin-bottom:14px; padding:16px">
        <div class="toolbar" style="margin-bottom:10px">
          <div><b>${dayLabel(list[0].start)}</b> <span class="muted small">· ${list.length} ${list.length===1?'entry':'entries'}</span></div>
          <div style="text-align:right">
            <div style="font-size:20px; font-weight:700">${fmtHM(dayTotal)} <span class="muted small">/ ${SHIFT_HOURS-BREAK_HOURS}h</span></div>
            <div class="small" style="color:${col}">${status}</div>
          </div>
        </div>
        <div style="height:6px; background:var(--line); border-radius:999px; overflow:hidden; margin-bottom:12px">
          <div style="height:100%; width:${pct}%; background:${col}"></div>
        </div>
        <table><thead><tr><th>Time</th><th>Type</th><th>Customer</th><th>Note</th><th>Duration</th><th></th></tr></thead><tbody>${rows}</tbody></table>
      </div>`;
  });
  document.getElementById('historyTable').innerHTML = out;
}
async function delEntry(id){ if(!confirm('Delete this entry?')) return; await delEntryRemote(id); renderHistory(); }

/* ---------- Admin rollup ---------- */
function onRangeChange(){
  document.getElementById('customRange').classList.toggle('hidden', document.getElementById('adminRange').value!=='custom');
  renderAdmin();
}
function startOfWeek(d){ const x=new Date(d); const day=(x.getDay()+6)%7; x.setHours(0,0,0,0); x.setDate(x.getDate()-day); return x.getTime(); }
function rangeFilter(entries){
  const r = document.getElementById('adminRange') ? document.getElementById('adminRange').value : 'all';
  if(r==='all') return entries;
  if(r==='today') return entries.filter(e=>isToday(e.start));
  if(r==='week'){ const s=startOfWeek(new Date()); return entries.filter(e=>e.start>=s); }
  if(r==='custom'){
    const f=document.getElementById('adminFrom').value, t=document.getElementById('adminTo').value;
    const fs=f?new Date(f+'T00:00').getTime():-Infinity, ts=t?new Date(t+'T23:59:59').getTime():Infinity;
    return entries.filter(e=>e.start>=fs && e.start<=ts);
  }
  return entries;
}
function toggleSection(id, el){
  const d = document.getElementById(id);
  const hidden = d.classList.toggle('hidden');
  const c = el.querySelector('.caret'); if(c) c.textContent = hidden ? '▸' : '▾';
}
function populateAgentFilter(){
  const sel = document.getElementById('adminAgent');
  if(!sel) return;
  const cur = sel.value;
  const names = [...new Set(loadEntries().map(e=>e.name||e.user))].sort((a,b)=>a.localeCompare(b));
  sel.innerHTML = '<option value="all">All agents</option>' + names.map(n=>`<option value="${esc(n)}">${esc(n)}</option>`).join('');
  if([...sel.options].some(o=>o.value===cur)) sel.value = cur;
}
function renderAdmin(){
  if(!isAdmin) return;
  populateAgentFilter();
  let all = rangeFilter(loadEntries());
  const agent = document.getElementById('adminAgent') ? document.getElementById('adminAgent').value : 'all';
  if(agent!=='all') all = all.filter(e=>(e.name||e.user)===agent);
  const total=all.reduce((a,e)=>a+e.seconds,0);
  const agents=new Set(all.map(e=>e.name||e.user)), customers=new Set(all.map(e=>e.customer));
  document.getElementById('adminStats').innerHTML=
    `<div class="box"><div class="n">${fmtDur(total)}</div><div class="l">Total tracked</div></div>`+
    `<div class="box"><div class="n">${all.length}</div><div class="l">Entries</div></div>`+
    `<div class="box"><div class="n">${agents.size}</div><div class="l">Agents</div></div>`+
    `<div class="box"><div class="n">${customers.size}</div><div class="l">Customers</div></div>`;
  document.getElementById('byAgent').innerHTML    = rollupTable(all, 'name',     'Agent');
  document.getElementById('byCustomer').innerHTML = rollupTable(all, 'customer', 'Customer');
  document.getElementById('byType').innerHTML     = rollupTable(all, 'type',     'Activity', true);
}
function rollupTable(all, key, header, isType){
  if(all.length===0) return '<div class="empty">No data in this range.</div>';
  const map={};
  all.forEach(e=>{ const k=e[key]||'—'; if(!map[k])map[k]={seconds:0,count:0}; map[k].seconds+=e.seconds; map[k].count++; });
  const sorted=Object.entries(map).sort((a,b)=>b[1].seconds-a[1].seconds);
  const max=sorted[0][1].seconds||1;
  const rows=sorted.map(([k,v])=>{
    const disp=isType?`<span class="pill ${TYPES[k].cls}">${TYPES[k].label}</span>`:esc(k);
    const pct=Math.round(v.seconds/max*100);
    return `<tr><td>${disp}</td><td>${v.count}</td>
      <td style="width:42%"><div class="bar-wrap"><div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div><b style="white-space:nowrap">${fmtDur(v.seconds)}</b></div></td></tr>`;
  }).join('');
  return `<table><thead><tr><th>${header}</th><th>Entries</th><th>Time</th></tr></thead><tbody>${rows}</tbody></table>`;
}

/* ---------- Export ---------- */
function exportCSV(scope){
  let data = loadEntries();
  if(scope==='mine') data=data.filter(e=>e.user===currentUser);
  if(scope==='all'){
    data=rangeFilter(data);
    const agent = document.getElementById('adminAgent') ? document.getElementById('adminAgent').value : 'all';
    if(agent!=='all') data = data.filter(e=>(e.name||e.user)===agent);
  }
  if(data.length===0){ alert('Nothing to export yet.'); return; }
  const head=['Agent','Email','Date','Type','Customer','Note','Seconds','Duration'];
  const lines=[head.join(',')];
  data.sort((a,b)=>b.start-a.start).forEach(e=>{
    lines.push([e.name||'', e.user, fmtDate(e.start), TYPES[e.type].label, e.customer, e.note, e.seconds, fmtDur(e.seconds)].map(csvCell).join(','));
  });
  const blob=new Blob([lines.join('\n')],{type:'text/csv'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download=`time-tracker-${scope}-${new Date().toISOString().slice(0,10)}.csv`; a.click();
}
function csvCell(v){ v=String(v??''); return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v; }
function esc(s){ return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

/* ---------- Boot ---------- */
document.getElementById('customer').addEventListener('keydown', e=>{ if(e.key==='Enter' && !timer) startTimer(); });
showView('loading');
console.log('[firehouse] boot; url=', SUPABASE_URL);
sb.auth.onAuthStateChange((evt, session)=>{ console.log('[firehouse] authEvent', evt); handleSession(session); });
sb.auth.getSession()
  .then(({data})=>handleSession(data.session))
  .catch(err=>{ console.error('[firehouse] getSession failed', err); if(!booted) showView('login'); });
// safety net: never stay stuck on Loading
setTimeout(()=>{ if(!booted && document.getElementById('appView').classList.contains('hidden')){ console.warn('[firehouse] boot timeout -> login'); showView('login'); } }, 6000);
</script>
